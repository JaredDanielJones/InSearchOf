name: Deploy to Firebase App Hosting

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # Validate the build locally before triggering App Hosting deployment.
      # App Hosting builds from source on Google infrastructure, so this step
      # catches errors early without producing the actual deployment artifact.
      - name: Validate build
        run: npm run build
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      # Firebase App Hosting — builds & deploys the Next.js app on Cloud Run.
      # Requires the App Hosting backend to be created first in the Firebase Console:
      #   https://console.firebase.google.com/project/insearchof-bd345/apphosting
      # The backendId below must match the ID you chose when creating the backend.
      - name: Deploy to Firebase App Hosting
        uses: FirebaseExtended/action-apphosting-deploy@v0
        with:
          projectId: insearchof-bd345
          backendId: insearchof-bd345
          serviceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_INSEARCHOF_BD345 }}
